<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="1530" version="1.1" width="2400" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow_maroon" markerHeight="12" markerWidth="12" orient="auto" refX="11" refY="6"><path d="M0,0 L12,6 L0,12 z" fill="#8F373A" /></marker><marker id="arrow_green" markerHeight="12" markerWidth="12" orient="auto" refX="11" refY="6"><path d="M0,0 L12,6 L0,12 z" fill="#1F6C43" /></marker><marker id="arrow_blue" markerHeight="12" markerWidth="12" orient="auto" refX="11" refY="6"><path d="M0,0 L12,6 L0,12 z" fill="#275A9A" /></marker><marker id="arrow_default" markerHeight="12" markerWidth="12" orient="auto" refX="11" refY="6"><path d="M0,0 L12,6 L0,12 z" fill="#8F373A" /></marker></defs><defs><marker id="arrow_maroon" markerHeight="12" markerWidth="12" orient="auto" refX="11" refY="6"><path d="M0,0 L12,6 L0,12 z" fill="#8F373A" /></marker><marker id="arrow_green" markerHeight="12" markerWidth="12" orient="auto" refX="11" refY="6"><path d="M0,0 L12,6 L0,12 z" fill="#1F6C43" /></marker><marker id="arrow_blue" markerHeight="12" markerWidth="12" orient="auto" refX="11" refY="6"><path d="M0,0 L12,6 L0,12 z" fill="#275A9A" /></marker><marker id="arrow_default" markerHeight="12" markerWidth="12" orient="auto" refX="11" refY="6"><path d="M0,0 L12,6 L0,12 z" fill="#8F373A" /></marker></defs><rect fill="#F9FAF7" height="1530" width="2400" x="0" y="0" /><circle cx="-80" cy="1430" fill="#F8DCDD" opacity="0.45" r="280" /><circle cx="1224.0" cy="120" fill="#DCE8F7" opacity="0.85" r="78" /><circle cx="2410" cy="110" fill="#DDEEE5" opacity="0.7" r="250" /><text fill="#10203B" font-weight="800" style="font-family:Inter; font-size:60px;" text-anchor="middle" x="1200.0" y="88"><tspan dy="0" x="1200.0">Why This Tool Exists</tspan></text><text fill="#48566A" font-weight="500" style="font-family:Inter; font-size:24px;" text-anchor="middle" x="1200.0" y="145"><tspan dy="0" x="1200.0">Short-lived keys help security. Manual renewal hurts the UX.</tspan></text><rect fill="#FDF2F2" height="1230" rx="42" ry="42" stroke="#E9B1B4" stroke-width="2.5" width="1040" x="80" y="210" /><rect fill="#EEF9F1" height="1230" rx="42" ry="42" stroke="#98D7A7" stroke-width="2.5" width="1040" x="1280" y="210" /><rect fill="#F6DCDC" height="58" rx="28" ry="28" stroke="none" stroke-width="0" width="345" x="155" y="270" /><text fill="#B24547" font-weight="700" style="font-family:Inter; font-size:18px;" text-anchor="middle" x="328" y="308"><tspan dy="0" x="328">WITHOUT THE TOOL</tspan></text><text fill="#8F373A" font-weight="800" style="font-family:Inter; font-size:34px;" x="155" y="390"><tspan dy="0" x="155">Manual key renewal</tspan></text><text fill="#9A4C4E" font-weight="500" style="font-family:Inter; font-size:22px;" x="155" y="438"><tspan dy="0" x="155">A recurring workflow that burns time and invites unsafe shortcuts.</tspan></text><rect fill="#F6D29C" height="120" rx="26" ry="26" stroke="#D79223" stroke-width="3" width="330" x="185" y="520" /><text fill="#8E5A08" font-weight="700" style="font-family:Inter; font-size:22px;" text-anchor="middle" x="350.0" y="587.3333333333334"><tspan dy="0" x="350.0">SSO + login</tspan></text><rect fill="#F6D29C" height="120" rx="26" ry="26" stroke="#D79223" stroke-width="3" width="330" x="665" y="520" /><text fill="#8E5A08" font-weight="700" style="font-family:Inter; font-size:22px;" text-anchor="middle" x="830.0" y="587.3333333333334"><tspan dy="0" x="830.0">Navigate + renew</tspan></text><rect fill="#F9D7DC" height="120" rx="26" ry="26" stroke="#EB6670" stroke-width="3" width="330" x="665" y="765" /><text fill="#AB3B45" font-weight="700" style="font-family:Inter; font-size:22px;" text-anchor="middle" x="830.0" y="832.3333333333334"><tspan dy="0" x="830.0">Copy fresh key</tspan></text><rect fill="#F9D7DC" height="120" rx="26" ry="26" stroke="#EB6670" stroke-width="3" width="330" x="185" y="765" /><text fill="#AB3B45" font-weight="700" style="font-family:Inter; font-size:21px;" text-anchor="middle" x="350.0" y="815.0"><tspan dy="0" x="350.0">Paste into</tspan></text><text fill="#AB3B45" font-weight="600" style="font-family:Inter; font-size:18px;" text-anchor="middle" x="350.0" y="850.0"><tspan dy="0" x="350.0">shell config or .env</tspan></text><line marker-end="url(#arrow_maroon)" stroke="#8F373A" stroke-linecap="round" stroke-width="5" x1="515" x2="665" y1="580.0" y2="580.0" /><line marker-end="url(#arrow_maroon)" stroke="#8F373A" stroke-linecap="round" stroke-width="5" x1="830.0" x2="830.0" y1="640" y2="765" /><line marker-end="url(#arrow_maroon)" stroke="#8F373A" stroke-linecap="round" stroke-width="5" x1="665" x2="515" y1="825.0" y2="825.0" /><line marker-end="url(#arrow_maroon)" stroke="#8F373A" stroke-linecap="round" stroke-width="5" x1="350.0" x2="350.0" y1="765" y2="640" /><rect fill="#F6DCDC" height="56" rx="28" ry="28" stroke="none" stroke-width="0" width="500" x="350" y="940" /><text fill="#B24547" font-weight="700" style="font-family:Inter; font-size:18px;" text-anchor="middle" x="600" y="978"><tspan dy="0" x="600">REPEATS EVERY FEW DAYS</tspan></text><rect fill="#FFF1D6" height="150" rx="32" ry="32" stroke="#E2B44F" stroke-width="2.5" width="830" x="150" y="1060" /><circle cx="216" cy="1135" fill="#F6DEB1" r="28" /><path d="M 216 1115 L 228 1135 L 216 1155 L 204 1135 Z" fill="#C28B20" /><text fill="#8E5A08" font-weight="700" style="font-family:Inter; font-size:18px;" x="265" y="1116"><tspan dy="0" x="265">Manual copy/paste spreads secrets into user space</tspan></text><text fill="#8A6A2A" font-weight="600" style="font-family:Inter; font-size:17px;" x="265" y="1164"><tspan dy="0" x="265">Shell configs, .env files, notes, clipboard history.</tspan></text><rect fill="#F7F1E4" height="110" rx="28" ry="28" stroke="#E0BE62" stroke-width="3" width="255" x="150" y="1255" /><text fill="#8D6B1A" font-weight="700" style="font-family:Inter; font-size:20px;" text-anchor="middle" x="277.5" y="1316.6666666666667"><tspan dy="0" x="277.5">Interrupts focus</tspan></text><rect fill="#F7F1E4" height="110" rx="28" ry="28" stroke="#E0BE62" stroke-width="3" width="255" x="445" y="1255" /><text fill="#8D6B1A" font-weight="700" style="font-family:Inter; font-size:20px;" text-anchor="middle" x="572.5" y="1316.6666666666667"><tspan dy="0" x="572.5">Wastes time</tspan></text><rect fill="#FCE3E6" height="110" rx="28" ry="28" stroke="#E3A2AA" stroke-width="3" width="300" x="740" y="1255" /><text fill="#A54853" font-weight="700" style="font-family:Inter; font-size:20px;" text-anchor="middle" x="890.0" y="1316.6666666666667"><tspan dy="0" x="890.0">Increases exposure</tspan></text><rect fill="#D7F0DE" height="58" rx="28" ry="28" stroke="none" stroke-width="0" width="510" x="1355" y="270" /><text fill="#1F6C43" font-weight="700" style="font-family:Inter; font-size:18px;" text-anchor="middle" x="1610" y="308"><tspan dy="0" x="1610">WITH LITELLM-KEY-UPDATER</tspan></text><text fill="#1F6C43" font-weight="800" style="font-family:Inter; font-size:34px;" x="1355" y="390"><tspan dy="0" x="1355">Set it once. Let it rotate.</tspan></text><text fill="#2E7A4B" font-weight="500" style="font-family:Inter; font-size:22px;" x="1355" y="438"><tspan dy="0" x="1355">One-time setup, then background renewal with Keychain-backed retrieval.</tspan></text><text fill="#2E7A4B" font-weight="600" style="font-family:Inter; font-size:16px;" x="1355" y="540"><tspan dy="0" x="1355">One-time setup</tspan></text><rect fill="#D8E9FB" height="122" rx="28" ry="28" stroke="#73A9E3" stroke-width="3" width="270" x="1355" y="560" /><text fill="#275A9A" font-weight="700" style="font-family:Inter; font-size:24px;" text-anchor="middle" x="1490.0" y="629.0"><tspan dy="0" x="1490.0">Install</tspan></text><rect fill="#D8E9FB" height="122" rx="28" ry="28" stroke="#73A9E3" stroke-width="3" width="270" x="1670" y="560" /><text fill="#275A9A" font-weight="700" style="font-family:Inter; font-size:24px;" text-anchor="middle" x="1805.0" y="629.0"><tspan dy="0" x="1805.0">Configure</tspan></text><rect fill="#D9F3DE" height="122" rx="28" ry="28" stroke="#3AB965" stroke-width="3" width="270" x="1975" y="560" /><text fill="#246E3F" font-weight="700" style="font-family:Inter; font-size:24px;" text-anchor="middle" x="2110.0" y="629.0"><tspan dy="0" x="2110.0">Done</tspan></text><line marker-end="url(#arrow_green)" stroke="#1F6C43" stroke-linecap="round" stroke-width="5" x1="1625" x2="1670" y1="621.0" y2="621.0" /><line marker-end="url(#arrow_green)" stroke="#1F6C43" stroke-linecap="round" stroke-width="5" x1="1940" x2="1975" y1="621.0" y2="621.0" /><line marker-end="url(#arrow_green)" stroke="#1F6C43" stroke-linecap="round" stroke-width="5" x1="1805.0" x2="1805.0" y1="682" y2="755" /><rect fill="#F2FBF4" height="270" rx="36" ry="36" stroke="#97D5A5" stroke-width="2.5" width="870" x="1355" y="755" /><text fill="#2E7A4B" font-weight="700" style="font-family:Inter; font-size:18px;" x="1397" y="807"><tspan dy="0" x="1397">Background runtime</tspan></text><rect fill="#D8E9FB" height="105" rx="24" ry="24" stroke="#73A9E3" stroke-width="3" width="190" x="1397" y="843" /><text fill="#3258D4" font-weight="700" style="font-family:Inter; font-size:17px;" text-anchor="middle" x="1492.0" y="891.6750000000001"><tspan dy="0" x="1492.0">Scheduled</tspan><tspan dy="19.549999999999997" x="1492.0">check</tspan></text><rect fill="#D8E9FB" height="105" rx="24" ry="24" stroke="#73A9E3" stroke-width="3" width="190" x="1615" y="843" /><text fill="#3258D4" font-weight="700" style="font-family:Inter; font-size:17px;" text-anchor="middle" x="1710.0" y="891.6750000000001"><tspan dy="0" x="1710.0">Renew if</tspan><tspan dy="19.549999999999997" x="1710.0">expired</tspan></text><rect fill="#D9F3DE" height="105" rx="24" ry="24" stroke="#3AB965" stroke-width="3" width="190" x="1833" y="843" /><text fill="#246E3F" font-weight="700" style="font-family:Inter; font-size:16px;" text-anchor="middle" x="1928.0" y="891.9"><tspan dy="0" x="1928.0">Store in</tspan><tspan dy="18.4" x="1928.0">Keychain</tspan></text><rect fill="#D9F3DE" height="105" rx="24" ry="24" stroke="#3AB965" stroke-width="3" width="145" x="2051" y="843" /><text fill="#246E3F" font-weight="700" style="font-family:Inter; font-size:15px;" text-anchor="middle" x="2123.5" y="892.125"><tspan dy="0" x="2123.5">Apps read</tspan><tspan dy="17.25" x="2123.5">current key</tspan></text><line marker-end="url(#arrow_blue)" stroke="#3258D4" stroke-linecap="round" stroke-width="4" x1="1587" x2="1615" y1="895.5" y2="895.5" /><line marker-end="url(#arrow_green)" stroke="#1F6C43" stroke-linecap="round" stroke-width="4" x1="1805" x2="1833" y1="895.5" y2="895.5" /><line marker-end="url(#arrow_green)" stroke="#1F6C43" stroke-linecap="round" stroke-width="4" x1="2023" x2="2051" y1="895.5" y2="895.5" /><text fill="#3258D4" font-weight="700" style="font-family:Inter; font-size:16px;" x="1363" y="995"><tspan dy="0" x="1363">Example: daily at 9:30 AM</tspan></text><rect fill="#E7F0FC" height="120" rx="30" ry="30" stroke="#99BCE8" stroke-width="3" width="270" x="1355" y="1095" /><text fill="#275A9A" font-weight="700" style="font-family:Inter; font-size:20px;" text-anchor="middle" x="1490.0" y="1161.6666666666667"><tspan dy="0" x="1490.0">No repeat work</tspan></text><rect fill="#D9F3DE" height="120" rx="30" ry="30" stroke="#93D0A1" stroke-width="3" width="270" x="1670" y="1095" /><text fill="#1F6C43" font-weight="700" style="font-family:Inter; font-size:20px;" text-anchor="middle" x="1805.0" y="1161.6666666666667"><tspan dy="0" x="1805.0">Keychain-backed</tspan></text><rect fill="#D9F3DE" height="120" rx="30" ry="30" stroke="#93D0A1" stroke-width="3" width="270" x="1985" y="1095" /><text fill="#1F6C43" font-weight="700" style="font-family:Inter; font-size:20px;" text-anchor="middle" x="2120.0" y="1161.6666666666667"><tspan dy="0" x="2120.0">Auto fresh keys</tspan></text><rect fill="#F1FBF3" height="110" rx="32" ry="32" stroke="#A6D8B4" stroke-width="2.5" width="870" x="1355" y="1275" /><text fill="#1F6C43" font-weight="700" style="font-family:Inter; font-size:18px;" text-anchor="middle" x="1790" y="1320"><tspan dy="0" x="1790">Setup once, rotate in the background,</tspan><tspan dy="22.5" x="1790">and let tools read the current key.</tspan></text></svg>